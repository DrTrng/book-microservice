name: Build Auth Service

on:
  push:
    branches:
      - "main"
    paths:
      - "auth-service/**"

jobs:
  build-auth:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      
      - name: Spotless format check
        run: |
          cd auth-service
          mvn spotless:check

      - name: Build auth-service
        run: mvn clean install -pl auth-service -am -DskipTests