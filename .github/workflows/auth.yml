name: Build Auth Service

on:
  push:
    branches:
      - "**"
    paths:
      - "auth-service/**"
      - "core-service/**"
      - "parent-service/**"

jobs:
  build-auth:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Install parent-service
        run: mvn clean install -pl parent-service -DskipTests

      - name: Install core-service
        run: mvn clean install -pl core-service -DskipTests

      - name: Build auth service
        run: |
          cd auth-service
          mvn clean package -DskipTests