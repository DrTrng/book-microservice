name: Build Order Service

on:
  push:
    branches:
      - "**"
    paths:
      - "order-service/**"

jobs:
  build-product:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Build order service
        run: |
          cd order-service
          mvn clean package -DskipTests