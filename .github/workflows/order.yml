name: Build Order Service

on:
  push:
    branches:
      - "main"
    paths:
      - "order-service/**"

jobs:
  build-order:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Spotless format check
        run: |
          cd order-service
          mvn spotless:check
          
      - name: Build order service
        run: mvn clean install -pl order-service -am -DskipTests