name: Build Product Service

on:
  push:
    branches:
      - "main"
    paths:
      - "product-service/**"

jobs:
  build-product:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Spotless format check
        run: |
          cd product-service
          mvn spotless:check
          
      - name: Build product service
        run: mvn clean install -pl product-service -am -DskipTests