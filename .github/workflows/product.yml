name: Build Product Service

on:
  push:
    branches:
      - "**"
    paths:
      - "product-service/**"
      - "core-service/**"

jobs:
  build-product:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Build product service
        run: mvn clean install -pl product-service -am -DskipTests