name: Build User Service

on:
  push:
    branches:
      - "main"
    paths:
      - "user-service/**"

jobs:
  build-user:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Spotless format check
        run: |
          cd user-service
          mvn spotless:check
          
      - name: Build user service
        run: mvn clean install -pl user-service -am -DskipTests