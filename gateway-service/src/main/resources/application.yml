server:
  port: 8090

spring:
  cloud:
    gateway:
      routes:

        - id: auth-service
          uri: http://localhost:8080
          predicates:
            - Path=/api/auth/**

        - id: order-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/orders/**

        - id: payment-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/payments/**

        - id: product-service
          uri: http://localhost:8083
          predicates:

            - Path=/api/products/**
        - id: user-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/users/**